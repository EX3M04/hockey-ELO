<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIR HOCKEY HEROES ELO</title>
    <style>
        :root { --accent: #3498db; --red: #e74c3c; --bg: #fdfdfd; --gold: #f1c40f; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, sans-serif; }
        canvas { display: block; background: var(--bg); touch-action: none; }

        /* Заглушка для поворота экрана */
        #rotate-warning {
            display: none; position: fixed; inset: 0; background: #1a1a1a; 
            color: white; z-index: 9999; justify-content: center; align-items: center; 
            text-align: center; padding: 20px; flex-direction: column;
        }
        @media (orientation: portrait) { #rotate-warning { display: flex; } }

        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.92); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .card { background: #1a1a1a; padding: 25px; border-radius: 24px; text-align: center; width: 85%; max-width: 340px; color: white; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        button, select, input { width: 100%; padding: 12px; margin: 6px 0; border-radius: 12px; border: none; font-size: 15px; font-weight: bold; box-sizing: border-box; transition: 0.2s; }
        button { background: var(--accent); color: white; cursor: pointer; text-transform: uppercase; }
        button:active { transform: scale(0.97); }
        input { background: #222; color: white; border: 1px solid #444; }
        select { background: #333; color: white; cursor: pointer; }

        /* Таблица лидеров */
        .leaderboard { margin: 15px 0; background: rgba(255,255,255,0.03); border-radius: 14px; padding: 8px; max-height: 120px; overflow-y: auto; text-align: left; border: 1px solid #333; }
        .l-row { display: flex; justify-content: space-between; padding: 6px 10px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .l-row:last-child { border: none; }
        .l-row b { color: var(--gold); }
        .my-row { background: rgba(52, 152, 219, 0.2); border-radius: 8px; border: 1px solid var(--accent); }

        .danger-zone { margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; }
        .btn-logout { background: #444; font-size: 12px; height: 35px; padding: 0; }
        .btn-del { background: none; color: #777; font-size: 11px; text-decoration: underline; cursor: pointer; border: none; margin-top: 8px; width: auto; }
        .btn-del:hover { color: var(--red); }

        #gameUI { position: absolute; inset: 0; pointer-events: none; display: none; }
        .score { position: absolute; top: 0; left: 50%; transform: translateX(-50%); background: #fff; padding: 6px 35px; border-radius: 0 0 20px 20px; font-size: 26px; font-weight: 900; color: #333; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="rotate-warning">
    <div style="font-size: 50px; margin-bottom: 15px;">🔄</div>
    <p style="margin: 0; font-size: 18px;"><b>Переверните устройство</b></p>
    <p style="color: #888; font-size: 14px;">Для игры нужен горизонтальный режим</p>
</div>

<div id="overlay">
    <div class="card">
        <div id="authPanel">
            <h2 style="margin: 0 0 20px">HOCKEY HEROES</h2>
            <input type="text" id="nick" placeholder="Никнейм">
            <input type="password" id="pass" placeholder="Пароль">
            <button onclick="handleAuth()">ВОЙТИ / СОЗДАТЬ</button>
            <p style="font-size: 10px; color: #666; margin-top: 10px;">Новый ник регистрируется автоматически</p>
        </div>

        <div id="menuPanel" style="display:none">
            <h3 id="displayNick" style="margin:0; color:var(--accent); text-transform: uppercase;">...</h3>
            <p style="margin: 5px 0 15px; font-size: 14px;">ВАШ ELO: <b id="displayElo" style="color:var(--gold)">500</b></p>
            
            <div class="leaderboard" id="leaderList">Загрузка топа...</div>
            
            <select id="diff">
                <option value="5">СИЛЬВЕР (ЛЕГКО) -15</option>
                <option value="9" selected>БИГ СТАР (СРЕДНЕ) -30</option>
                <option value="15">ГЛОБАЛ (ХАРД) -50</option>
            </select>
            
            <button onclick="startGame()" style="height: 50px; font-size: 18px;">В БОЙ!</button>
            
            <div class="danger-zone">
                <button class="btn-logout" onclick="logout()">ВЫЙТИ ИЗ АККАУНТА</button>
                <button class="btn-del" onclick="deleteAccount()">Удалить аккаунт навсегда</button>
            </div>
        </div>
    </div>
</div>

<div id="gameUI">
    <div class="score"><span id="sb" style="color:var(--accent)">0</span> : <span id="sr" style="color:var(--red)">0</span></div>
</div>

<canvas id="stage"></canvas>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<script>
// --- КОНФИГУРАЦИЯ FIREBASE ---
const firebaseConfig = {
    apiKey: "AIzaSyDFc9a1K8gsU9PE1S-eGTTQiLNVeo0Gy-0",
    authDomain: "aerohocckey.firebaseapp.com",
    databaseURL: "https://aerohocckey-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "aerohocckey",
    storageBucket: "aerohocckey.firebasestorage.app",
    messagingSenderId: "449318086171",
    appId: "1:449318086171:web:0cb669d7a8d59a55763abe"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user = { name: localStorage.getItem('h_nick') || "", elo: 500 };
let active = false, scores = { b: 0, r: 0 };

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- СИСТЕМА ЛИДЕРОВ ---
function loadLeaderboard() {
    db.ref('players').orderByChild('elo').limitToLast(10).on('value', snap => {
        let players = [];
        snap.forEach(child => {
            players.push({ n: child.key, e: child.val().elo });
        });
        players.reverse();
        document.getElementById('leaderList').innerHTML = players.map((p, i) => `
            <div class="l-row ${p.n === user.name ? 'my-row' : ''}">
                <span>${i+1}. ${p.n}</span><b>${p.e}</b>
            </div>
        `).join('') || '<div style="text-align:center;font-size:12px;color:#666">Список пуст</div>';
    });
}

// --- УДАЛЕНИЕ АККАУНТА ---
function deleteAccount() {
    if (confirm("ВНИМАНИЕ!\nВы точно хотите удалить аккаунт " + user.name + "?\nВсе очки ELO будут стерты навсегда.")) {
        db.ref('players/' + user.name).remove().then(() => {
            alert("Аккаунт успешно удален из базы.");
            logout();
        }).catch(e => alert("Ошибка при удалении: " + e.message));
    }
}

function logout() {
    localStorage.removeItem('h_nick');
    location.reload();
}

// --- АВТОРИЗАЦИЯ ---
function handleAuth() {
    const nick = document.getElementById('nick').value.trim();
    const pass = document.getElementById('pass').value.trim();
    if(nick.length < 3 || pass.length < 4) return alert("Ник > 2, Пароль > 3 символов!");

    const passHash = CryptoJS.SHA256(pass).toString();
    
    db.ref('players/' + nick).once('value').then(snap => {
        if(snap.exists()) {
            if(snap.val().pass === passHash) {
                loginSuccess(nick);
            } else {
                alert("Неверный пароль для этого ника!");
            }
        } else {
            db.ref('players/' + nick).set({
                pass: passHash,
                elo: 500
            }).then(() => loginSuccess(nick));
        }
    });
}

function loginSuccess(nick) {
    localStorage.setItem('h_nick', nick);
    user.name = nick;
    document.getElementById('authPanel').style.display = 'none';
    document.getElementById('menuPanel').style.display = 'block';
    document.getElementById('displayNick').innerText = nick;
    
    loadLeaderboard();
    db.ref('players/' + nick + '/elo').on('value', s => {
        user.elo = s.val() || 500;
        document.getElementById('displayElo').innerText = user.elo;
    });
}

if(user.name) loginSuccess(user.name);

// --- ИГРОВАЯ ЛОГИКА ---
class Disc {
    constructor(c) { this.x=0; this.y=0; this.c=c; this.dx=0; this.dy=0; }
    draw(r) {
        ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI*2);
        ctx.fillStyle = this.c; ctx.fill();
        ctx.strokeStyle = "rgba(0,0,0,0.5)"; ctx.lineWidth = 3; ctx.stroke();
    }
}

const p1 = new Disc("#3498db"), bot = new Disc("#e74c3c"), puck = new Disc("#333");

async function startGame() {
    try {
        if (document.documentElement.requestFullscreen) {
            await document.documentElement.requestFullscreen();
            if (screen.orientation && screen.orientation.lock) {
                await screen.orientation.lock('landscape').catch(() => {});
            }
        }
    } catch (e) {}

    document.getElementById('overlay').style.display = 'none';
    document.getElementById('gameUI').style.display = 'block';
    scores = { b: 0, r: 0 };
    resetPositions();
    active = true;
    loop();
}

function resetPositions() {
    puck.x = canvas.width/2; puck.y = canvas.height/2;
    puck.dx = (Math.random() > 0.5 ? 8 : -8); puck.dy = (Math.random()-0.5)*10;
    p1.x = canvas.width*0.15; p1.y = canvas.height/2;
    bot.x = canvas.width*0.85; bot.y = canvas.height/2;
}

const move = (e) => {
    if(!active) return;
    let t = e.touches ? e.touches[0] : e;
    p1.x = Math.min(canvas.width/2 - 40, t.clientX);
    p1.y = t.clientY;
};
canvas.addEventListener('mousemove', move);
canvas.addEventListener('touchmove', e => { move(e); e.preventDefault(); }, {passive: false});

function loop() {
    if(!active) return;
    ctx.clearRect(0,0, canvas.width, canvas.height);
    let r = canvas.height*0.1, pr = canvas.height*0.05, gh = canvas.height*0.35;

    // Поле
    ctx.strokeStyle = "rgba(0,0,0,0.1)"; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height); ctx.stroke();
    ctx.strokeRect(0, (canvas.height-gh)/2, 8, gh);
    ctx.strokeRect(canvas.width-8, (canvas.height-gh)/2, 8, gh);

    // Бот
    let speed = parseInt(document.getElementById('diff').value);
    bot.x += (Math.max(canvas.width/2 + r + 20, puck.x) - bot.x) * 0.1 * (speed/10);
    bot.y += (puck.y - bot.y) * 0.1 * (speed/10);

    // Шайба
    puck.x += puck.dx; puck.y += puck.dy;
    puck.dx *= 0.992; puck.dy *= 0.992;

    if(puck.y < pr || puck.y > canvas.height - pr) { puck.dy *= -1; puck.y = Math.max(pr, Math.min(canvas.height-pr, puck.y)); }

    if(puck.x < pr) {
        if(puck.y > (canvas.height-gh)/2 && puck.y < (canvas.height+gh)/2) { scores.r++; resetPositions(); }
        else { puck.dx *= -1; puck.x = pr; }
    }
    if(puck.x > canvas.width - pr) {
        if(puck.y > (canvas.height-gh)/2 && puck.y < (canvas.height+gh)/2) { scores.b++; resetPositions(); }
        else { puck.dx *= -1; puck.x = canvas.width - pr; }
    }

    // Физика ударов
    [p1, bot].forEach(p => {
        let d = Math.hypot(puck.x-p.x, puck.y-p.y);
        if(d < r+pr) {
            let a = Math.atan2(puck.y-p.y, puck.x-p.x);
            let force = 16;
            puck.dx = Math.cos(a)*force; puck.dy = Math.sin(a)*force;
            puck.x = p.x + (r+pr+2)*Math.cos(a);
            puck.y = p.y + (r+pr+2)*Math.sin(a);
        }
    });

    document.getElementById('sb').innerText = scores.b;
    document.getElementById('sr').innerText = scores.r;

    // Финал матча
    if(scores.b >= 5 || scores.r >= 5) {
        active = false;
        let win = scores.b >= 5;
        let diffVal = parseInt(document.getElementById('diff').value);
        let eloChange = win ? 25 : (diffVal === 5 ? -15 : (diffVal === 9 ? -30 : -50));
        
        db.ref('players/' + user.name).update({ elo: user.elo + eloChange }).then(() => {
            alert(win ? "ПОБЕДА! +25 ELO" : "ПРОИГРЫШ! " + eloChange + " ELO");
            location.reload();
        });
        return;
    }

    puck.draw(pr); p1.draw(r); bot.draw(r);
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
